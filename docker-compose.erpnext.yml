# ERPNext — ERP backend for lib/erpnext MCP server
# Source: https://github.com/frappe/frappe_docker (pwd.yml)
#
# Usage:
#   docker compose -f docker-compose.erpnext.yml up -d
#   # Wait ~2min for site creation, then:
#   open http://localhost:8069
#   # Login: Administrator / admin
#
# API keys: generate in ERPNext UI → User Settings → API Access
# Then add to packages/pml/.env:
#   ERPNEXT_URL=http://localhost:8069
#   ERPNEXT_API_KEY=xxx
#   ERPNEXT_API_SECRET=xxx

services:
  erpnext-backend:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: unless-stopped
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin

  erpnext-configurator:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      REDIS_CACHE: erpnext-redis-cache:6379
      REDIS_QUEUE: erpnext-redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs

  erpnext-create-site:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: "no"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 erpnext-db:3306;
        wait-for-it -t 120 erpnext-redis-cache:6379;
        wait-for-it -t 120 erpnext-redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=admin --db-root-username=root --db-root-password=admin --install-app erpnext --set-default frontend;

  erpnext-db:
    image: mariadb:10.6
    container_name: erpnext-db
    networks:
      - erpnext
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 1s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - erpnext-db-data:/var/lib/mysql

  erpnext-frontend:
    image: frappe/erpnext:v16.6.0
    container_name: erpnext-frontend
    networks:
      - erpnext
    restart: unless-stopped
    depends_on:
      - erpnext-websocket
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: erpnext-backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: erpnext-websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    ports:
      - "8069:8080"

  erpnext-queue-long:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://erpnext-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://erpnext-redis-queue:6379

  erpnext-queue-short:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://erpnext-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://erpnext-redis-queue:6379

  erpnext-redis-queue:
    image: redis:6.2-alpine
    container_name: erpnext-redis-queue
    networks:
      - erpnext
    restart: unless-stopped
    volumes:
      - erpnext-redis-queue-data:/data

  erpnext-redis-cache:
    image: redis:6.2-alpine
    container_name: erpnext-redis-cache
    networks:
      - erpnext
    restart: unless-stopped

  erpnext-scheduler:
    image: frappe/erpnext:v16.6.0
    networks:
      - erpnext
    restart: unless-stopped
    command: ["bench", "schedule"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs

  erpnext-websocket:
    image: frappe/erpnext:v16.6.0
    container_name: erpnext-websocket
    networks:
      - erpnext
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      FRAPPE_REDIS_CACHE: redis://erpnext-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://erpnext-redis-queue:6379
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs

volumes:
  erpnext-db-data:
  erpnext-redis-queue-data:
  erpnext-sites:
  erpnext-logs:

networks:
  erpnext:
    driver: bridge
