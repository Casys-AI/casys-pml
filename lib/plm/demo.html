<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PML Live Feed</title>
<style>
  :root { --bg: #08080a; --surface: #131316; --surface2: #1a1a1f; --border: #27272e; --text: #e4e4e8; --muted: #717179; --accent: #FFB86F; --green: #4ade80; --red: #f87171; --blue: #60a5fa; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .shell { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  header .tag { font-size: 0.65rem; background: var(--surface2); color: var(--muted); padding: 0.15rem 0.5rem; border-radius: 9999px; border: 1px solid var(--border); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.connected { background: var(--green); }
  .hint { color: var(--muted); font-size: 0.75rem; margin-left: auto; }

  /* Empty state */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty p { font-size: 0.85rem; }

  /* Feed */
  .feed { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card-header { padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
  .card-header .tool-name { font-size: 0.8rem; font-weight: 600; font-family: 'SF Mono', monospace; }
  .card-header .timestamp { color: var(--muted); font-size: 0.65rem; margin-left: auto; }
  .card-header .duration { color: var(--blue); font-size: 0.65rem; font-family: 'SF Mono', monospace; }
  .card-header .viewer-tag { font-size: 0.55rem; background: rgba(78,205,196,0.15); color: #4ECDC4; padding: 0.1rem 0.35rem; border-radius: 3px; }
  .card-body { padding: 0; }
  .card-body.inline { padding: 0.85rem; }
  .card.error .card-header { border-bottom-color: var(--red); }
  .card.error .tool-name { color: var(--red); }

  /* Viewer iframe */
  .viewer-frame { width: 100%; border: none; background: var(--bg); min-height: 200px; display: block; }

  /* JSON fallback */
  .json-view { font-family: 'SF Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; background: var(--bg); border-radius: 6px; padding: 0.6rem; }
</style>
</head>
<body>
<div class="shell">

<header>
  <h1>PML Live Feed</h1>
  <span class="tag">MCP Apps</span>
  <span id="statusDot" class="status-dot"></span>
  <span class="hint">Waiting for tool calls from Claude...</span>
</header>

<div id="feed" class="feed">
  <div class="empty" id="emptyState">
    <div class="icon">~</div>
    <p>Call a PLM tool from Claude and the result will appear here.</p>
  </div>
</div>

</div>

<script>
// ─── Tool → Viewer Mapping (dynamic from server) ───────────

let TOOL_VIEWERS = {};

async function loadToolViewers() {
  try {
    const resp = await fetch(`${location.origin}/tools-meta`);
    if (resp.ok) {
      TOOL_VIEWERS = await resp.json();
      console.log('[feed] Loaded tool viewers:', Object.keys(TOOL_VIEWERS).length);
    }
  } catch { /* server not ready yet, will retry on first event */ }
}
loadToolViewers();

// ─── MCP Apps Host Protocol ─────────────────────────────────

/**
 * MCP Apps host — implements the official MCP Apps JSON-RPC protocol
 * (same as @modelcontextprotocol/ext-apps AppBridge).
 *
 * Protocol flow:
 * 1. Viewer sends:  { jsonrpc:"2.0", id:N, method:"ui/initialize", params:{...} }
 * 2. Host responds:  { jsonrpc:"2.0", id:N, result:{ protocolVersion, hostCapabilities, hostInfo, hostContext } }
 * 3. Viewer sends:  { jsonrpc:"2.0", method:"ui/notifications/initialized" }
 * 4. Host sends:    { jsonrpc:"2.0", method:"ui/notifications/tool-input", params:{ arguments:{} } }
 * 5. Host sends:    { jsonrpc:"2.0", method:"ui/notifications/tool-result", params:{ content:[...] } }
 */
function embedViewer(iframe, data) {
  let initialized = false;

  function onMessage(ev) {
    if (ev.source !== iframe.contentWindow) return;
    const msg = ev.data;
    if (!msg || msg.jsonrpc !== '2.0') return;

    // Handle ui/initialize request
    if (msg.method === 'ui/initialize') {
      iframe.contentWindow.postMessage({
        jsonrpc: '2.0',
        id: msg.id,
        result: {
          protocolVersion: '2026-01-26',
          hostInfo: { name: 'PML Live Feed', version: '1.0.0' },
          hostCapabilities: { openLinks: {}, logging: {} },
          hostContext: { theme: 'dark', displayMode: 'inline' },
        },
      }, '*');
      return;
    }

    // Handle ui/notifications/initialized — viewer is ready for data
    if (msg.method === 'ui/notifications/initialized' && !initialized) {
      initialized = true;
      // Send tool input (empty args — we only have the result)
      iframe.contentWindow.postMessage({
        jsonrpc: '2.0',
        method: 'ui/notifications/tool-input',
        params: { arguments: {} },
      }, '*');
      // Send tool result
      iframe.contentWindow.postMessage({
        jsonrpc: '2.0',
        method: 'ui/notifications/tool-result',
        params: {
          content: [{ type: 'text', text: JSON.stringify(data) }],
          isError: false,
        },
      }, '*');
      return;
    }

    // Handle ui/notifications/size-changed for auto-height
    if (msg.method === 'ui/notifications/size-changed') {
      const h = msg.params?.height;
      if (typeof h === 'number') {
        iframe.style.height = Math.min(Math.max(h, 150), 600) + 'px';
      }
      return;
    }

    // Handle ui/open-link requests
    if (msg.method === 'ui/open-link' && msg.id != null) {
      const url = msg.params?.url;
      if (url) window.open(url, '_blank', 'noopener,noreferrer');
      iframe.contentWindow.postMessage({ jsonrpc: '2.0', id: msg.id, result: {} }, '*');
      return;
    }

    // Handle ui/update-model-context (acknowledge silently)
    if (msg.method === 'ui/update-model-context' && msg.id != null) {
      iframe.contentWindow.postMessage({ jsonrpc: '2.0', id: msg.id, result: {} }, '*');
      return;
    }

    // Handle notifications/message (logging — just log to console)
    if (msg.method === 'notifications/message') {
      const p = msg.params;
      console.log(`[${p?.logger || 'viewer'}] ${p?.level}: ${JSON.stringify(p?.data)}`);
      return;
    }
  }

  window.addEventListener('message', onMessage);

  // Cleanup when iframe is removed
  const observer = new MutationObserver(() => {
    if (!document.contains(iframe)) {
      window.removeEventListener('message', onMessage);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

// ─── SSE Connection ──────────────────────────────────────────

const FEED_URL = `${location.origin}/feed`;
let es = null;
let reconnectTimer = null;

function connectSSE() {
  const dot = document.getElementById('statusDot');
  es = new EventSource(FEED_URL);

  es.onopen = () => {
    dot.className = 'status-dot connected';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  es.onmessage = (ev) => {
    try {
      const event = JSON.parse(ev.data);
      hideEmpty();
      if (event.isError) {
        addErrorCard(event.toolName, event.result?.error || 'Unknown error');
      } else {
        addResultCard(event.toolName, event.result, event.durationMs);
      }
    } catch (e) {
      console.warn('Feed parse error:', e);
    }
  };

  es.onerror = () => {
    dot.className = 'status-dot';
    es.close();
    reconnectTimer = setTimeout(connectSSE, 2000);
  };
}

function hideEmpty() {
  const el = document.getElementById('emptyState');
  if (el) el.remove();
}

// ─── Card Rendering ──────────────────────────────────────────

async function addResultCard(name, data, ms) {
  // Ensure tool viewers mapping is loaded
  if (Object.keys(TOOL_VIEWERS).length === 0) await loadToolViewers();

  const feed = document.getElementById('feed');
  const card = document.createElement('div');
  card.className = 'card';

  const viewerName = data?._viewerOverride || TOOL_VIEWERS[name];

  // Header
  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `
    <span class="tool-name">${esc(name)}</span>
    ${viewerName ? '<span class="viewer-tag">MCP App</span>' : ''}
    <span class="duration">${ms === 0 ? '&lt;1ms' : ms + 'ms'}</span>
    <span class="timestamp">${ts()}</span>`;
  card.appendChild(header);

  // Body — iframe viewer or JSON fallback
  const body = document.createElement('div');
  body.className = viewerName ? 'card-body' : 'card-body inline';

  if (viewerName) {
    // Real MCP Apps viewer in iframe
    const iframe = document.createElement('iframe');
    iframe.className = 'viewer-frame';
    iframe.title = `UI: ${viewerName}`;
    iframe.sandbox = 'allow-scripts';
    iframe.src = `/ui/${viewerName}`;
    body.appendChild(iframe);
    card.appendChild(body);

    // Wire up MCP Apps protocol
    embedViewer(iframe, data);
  } else {
    // JSON fallback for unmapped tools
    body.innerHTML = `<div class="json-view">${esc(JSON.stringify(data, null, 2))}</div>`;
    card.appendChild(body);
  }

  feed.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addErrorCard(name, msg) {
  const feed = document.getElementById('feed');
  const card = document.createElement('div');
  card.className = 'card error';
  card.innerHTML = `
    <div class="card-header"><span class="tool-name">${esc(name)}</span><span class="timestamp">${ts()}</span></div>
    <div class="card-body inline"><div style="color:var(--red); font-size:0.8rem;">${esc(msg)}</div></div>`;
  feed.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function ts() { return new Date().toLocaleTimeString(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// ─── Init ────────────────────────────────────────────────────
connectSSE();
</script>
</body>
</html>
