# Configuration des sources d'articles
# Utilisé par ArticleFetcherModule pour initialiser les adapters

# Sources RSS
rss_sources:
  - id: "nyt-world"
    name: "NYT World"
    url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"

# Sources NewsAPI
news_api_sources:
  - name: "NewsAPI"
    params:
      sortBy: "publishedAt"

# Configuration par défaut
default_config:
  max_articles_per_source: 10
  timeout_ms: 5000
  retry_attempts: 3
