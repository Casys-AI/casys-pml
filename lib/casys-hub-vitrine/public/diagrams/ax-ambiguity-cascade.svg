  <rect x="0" y="0" width="1080" height="420" fill="#08080a"/>
  <text x="540" y="56" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="36" fill="#f0ede8" text-anchor="middle">The Compound Error Tax</text>
  <text x="540" y="86" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#9ca3af" text-anchor="middle">Same intent, two operators, very different outcomes</text>
