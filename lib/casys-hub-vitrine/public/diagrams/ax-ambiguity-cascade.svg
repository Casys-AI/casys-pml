  <text x="725" y="165.6" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle">Runs --dry-run</text>
  <rect x="850" y="125" width="200" height="70" rx="10" fill="#1a3a1a" stroke="#4ade80" stroke-width="3"/>
