  <text x="290" y="204" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#4ade80" text-anchor="start">Ambiguity absorbed at step 2</text>
  <text x="290" y="314" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#ef4444" text-anchor="start">Ambiguity compounded through step 4</text>
