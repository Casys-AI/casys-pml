<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 914 546" width="914" height="546">
  <!-- svg-source:excalidraw — dx-to-ax-loop.excalidraw -->
  <defs>
    <marker id="ah-fbbf24" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"/></marker>
    <marker id="ah-60a5fa" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/></marker>
    <marker id="ah-4ade80" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/></marker>
  </defs>

  <rect x="0" y="0" width="914" height="546" fill="#08080a"/>
  <text x="430" y="52" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="32" fill="#f0ede8" text-anchor="middle">The AX Execution Loop</text>
  <text x="430" y="76" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#9ca3af" text-anchor="middle">Plan, Scope, Act, Verify, Recover</text>
  <rect x="20" y="110" width="170" height="105" rx="12" fill="#1f1f23" stroke="#fbbf24" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="157.7">
    <tspan x="105">1. Plan</tspan>
    <tspan x="105" dy="20.8">Goal + constraints</tspan>
  </text>
  <rect x="225" y="110" width="170" height="105" rx="12" fill="#2d2d35" stroke="#fbbf24" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="157.7">
    <tspan x="310">2. Scope</tspan>
    <tspan x="310" dy="20.8">Relevant tools only</tspan>
  </text>
  <rect x="430" y="110" width="170" height="105" rx="12" fill="#1f1f23" stroke="#fbbf24" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="157.7">
    <tspan x="515">3. Act</tspan>
    <tspan x="515" dy="20.8">Smallest safe step</tspan>
  </text>
  <rect x="635" y="110" width="170" height="105" rx="12" fill="#2d2d35" stroke="#fbbf24" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="157.7">
    <tspan x="720">4. Verify</tspan>
    <tspan x="720" dy="20.8">Explicit criteria</tspan>
  </text>
  <path d="M190 162 L225 162" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-fbbf24)"/>
  <path d="M395 162 L430 162" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-fbbf24)"/>
  <path d="M600 162 L635 162" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-fbbf24)"/>
  <rect x="302" y="292" width="220" height="105" rx="12" fill="#1a1a1e" stroke="#60a5fa" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="339.7">
    <tspan x="412">5. Recover</tspan>
    <tspan x="412" dy="20.8">Retry, rollback, escalate</tspan>
  </text>
  <path d="M805 162 L870 162 L870 344 L522 344" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-60a5fa)"/>
  <path d="M302 344 L105 344 L105 215" fill="none" stroke="#4ade80" stroke-width="3" stroke-dasharray="8 4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-4ade80)"/>
  <text x="412.5" y="104" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#fbbf24" text-anchor="middle">happy path</text>
  <text x="810" y="294" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#60a5fa" text-anchor="start">failure</text>
  <text x="28" y="294" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#4ade80" text-anchor="start">retry</text>
  <rect x="20" y="430" width="785" height="44" rx="10" fill="#1a1a1e" stroke="#666666" stroke-width="2"/>
  <text x="412.5" y="457.25" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#9ca3af" text-anchor="middle">Guardrails + structured errors + resumable state reduce retries and escalation cost</text>
</svg>