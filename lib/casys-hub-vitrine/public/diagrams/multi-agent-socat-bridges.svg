<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <!-- svg-source:excalidraw — multi-agent-socat-bridges.excalidraw -->
  <defs>
    <marker id="ah-ffd43b" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#ffd43b"/></marker>
    <marker id="ah-74c0fc" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#74c0fc"/></marker>
  </defs>

  <rect x="0" y="0" width="880" height="380" fill="#08080a"/>
  <text x="410" y="42" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="22" fill="#f0ede8" text-anchor="middle">Multi-Agent Socat Bridges — Docker → VPS via Tailscale</text>
  <rect x="20" y="100" width="220" height="180" rx="22.5" fill="#3d1f1f" stroke="#ff6b6b" stroke-width="2"/>
  <text x="130" y="133" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#ff6b6b" text-anchor="middle">🐳 Container Docker</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="166">
    <tspan x="130">Agent sandboxé</tspan>
    <tspan x="130" dy="20.8"></tspan>
    <tspan x="130" dy="20.8">ssh -p 2222</tspan>
    <tspan x="130" dy="20.8">root@172.17.0.1</tspan>
  </text>
  <rect x="320" y="100" width="240" height="180" rx="22.5" fill="#1e3a5f" stroke="#74c0fc" stroke-width="2"/>
  <text x="440" y="133" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#74c0fc" text-anchor="middle">🖥️ HOST (Gateway)</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="166">
    <tspan x="440">socat</tspan>
    <tspan x="440" dy="20.8">TCP-LISTEN:2222,fork</tspan>
    <tspan x="440" dy="20.8">→ TCP:100.y.y.y:22</tspan>
    <tspan x="440" dy="20.8"></tspan>
    <tspan x="440" dy="20.8">Tailscale: 100.x.x.x</tspan>
  </text>
  <rect x="640" y="100" width="220" height="180" rx="22.5" fill="#1e3d2e" stroke="#69db7c" stroke-width="2"/>
  <text x="750" y="133" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#69db7c" text-anchor="middle">🌐 VPS distant</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f0ede8" text-anchor="middle" y="171">
    <tspan x="750">VPS partagé</tspan>
    <tspan x="750" dy="20.8">100.y.y.y</tspan>
    <tspan x="750" dy="20.8"></tspan>
    <tspan x="750" dy="20.8">sshd :22</tspan>
  </text>
  <path d="M242 190 L318 190" fill="none" stroke="#ffd43b" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-ffd43b)"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#ffd43b" text-anchor="middle" y="209">
    <tspan x="280">① docker0</tspan>
    <tspan x="280" dy="18.2">172.17.0.1:2222</tspan>
  </text>
  <path d="M562 190 L638 190" fill="none" stroke="#74c0fc" stroke-width="3" stroke-dasharray="8 4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-74c0fc)"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#74c0fc" text-anchor="middle" y="209">
    <tspan x="600">② Tailscale</tspan>
    <tspan x="600" dy="18.2">→ 100.y.y.y:22</tspan>
  </text>
  <text x="750" y="261" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#69db7c" text-anchor="middle">③ SSH → VPS</text>
  <text x="130" y="304" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#ff6b6b" text-anchor="middle">docker0 bridge</text>
  <text x="440" y="304" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#74c0fc" text-anchor="middle">host network</text>
  <text x="750" y="304" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#69db7c" text-anchor="middle">Tailscale mesh VPN</text>
  <text x="430" y="351" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#ff6b6b" text-anchor="middle">🔒 Pas de NET_ADMIN = pas de Tailscale dans le container → socat bridge obligatoire</text>
</svg>