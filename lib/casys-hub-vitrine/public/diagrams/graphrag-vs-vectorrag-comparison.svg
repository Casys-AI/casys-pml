<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <rect width="700" height="340" fill="#08080a" rx="8"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">RETRIEVAL APPROACHES COMPARED</text>

  <!-- Three columns -->
  <!-- Vector RAG -->
  <rect x="20" y="50" width="210" height="260" rx="8" fill="#0f0f1a" stroke="#475569" stroke-width="1"/>
  <rect x="20" y="50" width="210" height="40" rx="8" fill="#1e293b"/>
  <rect x="20" y="82" width="210" height="8" fill="#0f0f1a"/>
  <text x="125" y="75" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">Vector RAG</text>

  <!-- Chunks illustration -->
  <g transform="translate(40,105)">
    <rect x="0" y="0" width="170" height="16" rx="3" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
    <rect x="0" y="0" width="60" height="16" rx="3" fill="#6366f1" opacity="0.3"/>
    <text x="85" y="12" text-anchor="middle" fill="#64748b" font-size="8">chunk 1 — cosine: 0.87</text>

    <rect x="0" y="22" width="170" height="16" rx="3" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
    <rect x="0" y="22" width="45" height="16" rx="3" fill="#6366f1" opacity="0.2"/>
    <text x="85" y="34" text-anchor="middle" fill="#64748b" font-size="8">chunk 2 — cosine: 0.82</text>

    <rect x="0" y="44" width="170" height="16" rx="3" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
    <rect x="0" y="44" width="30" height="16" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="85" y="56" text-anchor="middle" fill="#64748b" font-size="8">chunk 3 — cosine: 0.79</text>
  </g>

  <text x="125" y="200" text-anchor="middle" fill="#94a3b8" font-size="9">No relationships</text>
  <text x="125" y="214" text-anchor="middle" fill="#94a3b8" font-size="9">No multi-hop</text>
  <text x="125" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">Fast, simple</text>

  <rect x="55" y="248" width="140" height="24" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="125" y="264" text-anchor="middle" fill="#94a3b8" font-size="10">~50ms latency</text>

  <!-- Microsoft GraphRAG -->
  <rect x="245" y="50" width="210" height="260" rx="8" fill="#0f0f1a" stroke="#a78bfa" stroke-width="1"/>
  <rect x="245" y="50" width="210" height="40" rx="8" fill="#1a0a2e"/>
  <rect x="245" y="82" width="210" height="8" fill="#0f0f1a"/>
  <text x="350" y="75" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Microsoft GraphRAG</text>

  <!-- Community graph illustration -->
  <g transform="translate(270,105)">
    <!-- Community 1 -->
    <circle cx="40" cy="20" r="28" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="30" cy="14" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="50" cy="18" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="38" cy="30" r="4" fill="#a78bfa" opacity="0.7"/>
    <line x1="30" y1="14" x2="50" y2="18" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <line x1="50" y1="18" x2="38" y2="30" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>

    <!-- Community 2 -->
    <circle cx="120" cy="25" r="28" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <circle cx="110" cy="18" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="130" cy="20" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="118" cy="35" r="4" fill="#a78bfa" opacity="0.7"/>
    <line x1="110" y1="18" x2="130" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <line x1="130" y1="20" x2="118" y2="35" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>

    <!-- Cross-community edge -->
    <line x1="56" y1="22" x2="100" y2="22" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  </g>

  <text x="350" y="200" text-anchor="middle" fill="#c4b5fd" font-size="9">Leiden communities</text>
  <text x="350" y="214" text-anchor="middle" fill="#c4b5fd" font-size="9">Map-reduce summaries</text>
  <text x="350" y="228" text-anchor="middle" fill="#c4b5fd" font-size="9">Batch processing</text>

  <rect x="280" y="248" width="140" height="24" rx="12" fill="#1a0a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="350" y="264" text-anchor="middle" fill="#c4b5fd" font-size="10">~minutes latency</text>

  <!-- Casys SHGAT -->
  <rect x="470" y="50" width="210" height="260" rx="8" fill="#0f0f1a" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="470" y="50" width="210" height="40" rx="8" fill="#0f2a1a"/>
  <rect x="470" y="82" width="210" height="8" fill="#0f0f1a"/>
  <text x="575" y="75" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Casys SHGAT</text>

  <!-- Heterogeneous graph illustration -->
  <g transform="translate(495,100)">
    <!-- Tool nodes (circles) -->
    <circle cx="20" cy="20" r="8" fill="#0c1929" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="20" y="23" text-anchor="middle" fill="#60a5fa" font-size="6">T</text>

    <circle cx="80" cy="10" r="8" fill="#0c1929" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="80" y="13" text-anchor="middle" fill="#60a5fa" font-size="6">T</text>

    <circle cx="140" cy="25" r="8" fill="#0c1929" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="140" y="28" text-anchor="middle" fill="#60a5fa" font-size="6">T</text>

    <!-- Capability nodes (diamonds approx) -->
    <rect x="44" y="40" width="14" height="14" rx="2" fill="#0f1a2e" stroke="#a78bfa" stroke-width="1.5" transform="rotate(45,51,47)"/>
    <rect x="104" y="38" width="14" height="14" rx="2" fill="#0f1a2e" stroke="#a78bfa" stroke-width="1.5" transform="rotate(45,111,45)"/>

    <!-- Attention edges (varying thickness = attention weight) -->
    <line x1="28" y1="20" x2="44" y2="40" stroke="#4ade80" stroke-width="2.5" opacity="0.7"/>
    <line x1="76" y1="18" x2="56" y2="40" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
    <line x1="84" y1="18" x2="106" y2="38" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
    <line x1="136" y1="30" x2="118" y2="42" stroke="#4ade80" stroke-width="1" opacity="0.4"/>

    <!-- GRU arrow -->
    <text x="80" y="72" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="600">GRU predict →</text>
  </g>

  <text x="575" y="200" text-anchor="middle" fill="#4ade80" font-size="9">Heterogeneous attention</text>
  <text x="575" y="214" text-anchor="middle" fill="#4ade80" font-size="9">Real-time, incremental</text>
  <text x="575" y="228" text-anchor="middle" fill="#4ade80" font-size="9">MCP-native routing</text>

  <rect x="505" y="248" width="140" height="24" rx="12" fill="#0f2a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="264" text-anchor="middle" fill="#4ade80" font-size="10">~15ms latency</text>

  <!-- Bottom comparison bar -->
  <text x="125" y="325" text-anchor="middle" fill="#64748b" font-size="9">Document QA</text>
  <text x="350" y="325" text-anchor="middle" fill="#64748b" font-size="9">Corpus exploration</text>
  <text x="575" y="325" text-anchor="middle" fill="#64748b" font-size="9">Tool orchestration</text>
</svg>