    <tspan x="1260" dy="18.2">(autre développeur)</tspan>
  </text>
  <path d="M1260 175 L1260 235" fill="none" stroke="#7950f2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-7950f2)" marker-start="url(#ah-7950f2)"/>
  <rect x="220" y="300" width="850" height="80" rx="10" fill="rgba(20,20,23,0.8)" stroke="#868e96" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#868e96" text-anchor="middle" y="323">
    <tspan x="645">🛡️ Garde-fous : requireMention: true → anti-boucle infinie  |  Cross-context : spawn WhatsApp ≠ accès Discord</tspan>
    <tspan x="645" dy="16.9">Communication bidirectionnelle contrôlée : chaque agent déclare ses permissions  |  principal ↔ sandbox via allowAgents</tspan>
  </text>
