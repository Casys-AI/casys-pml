<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <!-- svg-source:excalidraw — pml-architecture.excalidraw -->
  <defs>
    <marker id="ah-666666" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#666666"/></marker>
  </defs>

  <rect x="0" y="0" width="720" height="460" fill="#08080a"/>
  <g transform="translate(-20 0)">
  <rect x="40" y="20" width="520" height="100" rx="8" fill="#1f1f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="60" y="42" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="12" fill="#a78bfa" text-anchor="start">LAYER 1: ORCHESTRATION</text>
  <text x="60" y="61" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#f0ede8" text-anchor="start">Claude / LLM</text>
  <text x="60" y="79" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">- Receives user intent</text>
  <text x="60" y="94" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">- Queries: &quot;Existing capability?&quot;</text>
  <text x="60" y="109" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">- YES: execute cached | NO: generate → learn</text>
  <path d="M300 125 L300 155" fill="none" stroke="#666666" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-666666)" marker-start="url(#ah-666666)"/>
  <text x="310" y="140" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#666666" text-anchor="start">Results + Suggestions</text>
  <rect x="40" y="160" width="520" height="140" rx="8" fill="#1f1f23" stroke="#60a5fa" stroke-width="2"/>
  <text x="60" y="182" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="12" fill="#60a5fa" text-anchor="start">LAYER 2: CAPABILITY ENGINE</text>
  <text x="310" y="181" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#60a5fa" text-anchor="start">PML Gateway</text>
  <rect x="60" y="195" width="110" height="40" rx="4" fill="#2d2d35" stroke="#60a5fa" stroke-width="1"/>
  <text x="115" y="209" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">CapabilityMatcher</text>
  <text x="115" y="222" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle">intent → capability</text>
  <rect x="185" y="195" width="110" height="40" rx="4" fill="#2d2d35" stroke="#60a5fa" stroke-width="1"/>
  <text x="240" y="209" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">WorkerBridge</text>
  <text x="240" y="222" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle">routes MCP calls</text>
  <rect x="310" y="195" width="110" height="40" rx="4" fill="#2d2d35" stroke="#60a5fa" stroke-width="1"/>
  <text x="365" y="209" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">SuggestionEngine</text>
  <text x="365" y="222" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle">PageRank, Louvain</text>
  <rect x="435" y="195" width="110" height="40" rx="4" fill="#2d2d35" stroke="#60a5fa" stroke-width="1"/>
  <text x="490" y="209" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">GraphRAG</text>
  <text x="490" y="222" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle">continuous learning</text>
  <rect x="200" y="250" width="200" height="35" rx="4" fill="#2d2d35" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="268" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">PGlite + pgvector</text>
  <text x="300" y="279" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle">Embeddings, Graph, Cache</text>
  <path d="M300 305 L300 335" fill="none" stroke="#666666" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-666666)" marker-start="url(#ah-666666)"/>
  <text x="310" y="320" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#666666" text-anchor="start">RPC (tool calls)</text>
  <rect x="40" y="340" width="520" height="100" rx="8" fill="#1f1f23" stroke="#fbbf24" stroke-width="2"/>
  <text x="60" y="362" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="12" fill="#fbbf24" text-anchor="start">LAYER 3: EXECUTION</text>
  <text x="280" y="361" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#fbbf24" text-anchor="start">Deno Worker Sandbox</text>
  <rect x="60" y="375" width="140" height="50" rx="4" fill="#2d2d35" stroke="#fbbf24" stroke-width="1"/>
  <text x="130" y="393" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Isolation</text>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle" y="407">
    <tspan x="130">permissions: &quot;none&quot;</tspan>
    <tspan x="130" dy="9.1">Secure by default</tspan>
  </text>
  <rect x="220" y="375" width="140" height="50" rx="4" fill="#2d2d35" stroke="#fbbf24" stroke-width="1"/>
  <text x="290" y="393" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Tool Proxies</text>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle" y="407">
    <tspan x="290">mcp.server.tool()</tspan>
    <tspan x="290" dy="9.1">Secure RPC calls</tspan>
  </text>
  <rect x="380" y="375" width="165" height="50" rx="4" fill="#2d2d35" stroke="#fbbf24" stroke-width="1"/>
  <text x="465" y="393" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Capabilities</text>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="middle" y="407">
    <tspan x="465">Inline functions</tspan>
    <tspan x="465" dy="9.1">(zero overhead)</tspan>
  </text>
  <text x="580" y="30" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#f0ede8" text-anchor="start">Key Metrics</text>
  <text x="580" y="49" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="start">Context: &lt;5%</text>
  <text x="580" y="64" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="start">Latency: 5x → 1x</text>
  <text x="580" y="79" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="start">Servers: 15+</text>
  <text x="580" y="94" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#4ade80" text-anchor="start">Perceived latency: 0ms</text>
  </g>
</svg>