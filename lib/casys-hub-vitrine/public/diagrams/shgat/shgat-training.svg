ction="ltr" dominant-baseline="alphabetic">InfoNCE Loss</text></g><g transform="translate(558 84) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#f472b6" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">contrastive</text></g><!-- Feedback arrow (loop back) --><g stroke-linecap="round"><path d="M558 107 C558 130, 558 140, 558 150 C558 160, 548 165, 538 165 C450 165, 350 165, 242 165 C232 165, 225 160, 225 150 C225 140, 230 125, 242 107" stroke="#4ade80" stroke-width="2" fill="none" stroke-dasharray="8 5"></path><path d="M237 115 L242 107 L247 115" stroke="#4ade80" stroke-width="2" fill="none"></path></g><g transform="translate(390 152) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#4ade80" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">gradient update (backprop)</text></g><!-- PER Buffer --><g stroke-linecap="round" transform="translate(40 190) rotate(0 65 22)"><path d="M6 0 C36 -0.5, 66 0.3, 124 0 C128 0.2, 130 2, 130 6 C130 15, 130.3 30, 130 38 C130.2 42, 128 44, 124 44 C86 44.5, 48 43.5, 6 44 C2 44, 0 42, 0 38 C0.3 28, -0.4 18, 0 6 C0.3 2, 2 -0.3, 6 0" stroke="#fbbf24" stroke-width="1.5" fill="#2d2d35"></path></g><g transform="translate(105 204) rotate(0 0 0)"><text x="0" y="12" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#fbbf24" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">PER Buffer</text></g><g transform="translate(105 220) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#9ca3af" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">high-error examples</text></g><g transform="translate(105 232) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#9ca3af" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">sampled more often</text></g><!-- Temperature Annealing --><g stroke-linecap="round" transform="translate(240 190) rotate(0 65 22)"><path d="M6 0 C36 -0.5, 66 0.3, 124 0 C128 0.2, 130 2, 130 6 C130 15, 130.3 30, 130 38 C130.2 42, 128 44, 124 44 C86 44.5, 48 43.5, 6 44 C2 44, 0 42, 0 38 C0.3 28, -0.4 18, 0 6 C0.3 2, 2 -0.3, 6 0" stroke="#f472b6" stroke-width="1.5" fill="#2d2d35"></path></g><g transform="translate(305 204) rotate(0 0 0)"><text x="0" y="12" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#f472b6" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Temperature</text></g><g transform="translate(305 220) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#9ca3af" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">cosine annealing</text></g><g transform="translate(305 232) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#9ca3af" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">0.10 -&gt; 0.06</text></g><!-- Hard Negatives --><g stroke-linecap="round" transform="translate(440 190) rotate(0 65 22)"><path d="M6 0 C36 -0.5, 66 0.3, 124 0 C128 0.2, 130 2, 130 6 C130 15, 130.3 30, 130 38 C130.2 42, 128 44, 124 44 C86 44.5, 48 43.5, 6 44 C2 44, 0 42, 0 38 C0.3 28, -0.4 18, 0 6 C0.3 2, 2 -0.3, 6 0" stroke="#4ade80" stroke-width="1.5" fill="#2d2d35"></path></g><g transform="translate(505 204) rotate(0 0 0)"><text x="0" y="12" font-family="Virgil, Segoe UI Emoji" font-size="12px" fill="#4ade80" text-anchor="middle" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Hard Negatives</text></g><g transform="translate(505 220) rotate(0 0 0)"><text x="0" y="10" font-family="Virgil, Segoe UI Emoji" font-size="10px" fill="#9ca3af" text-anchor="middle" style="white-s