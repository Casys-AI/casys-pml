<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <rect width="720" height="200" fill="#08080a" rx="8"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">THE AGENTIC SPECTRUM</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="33%" stop-color="#6366f1"/>
      <stop offset="66%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <rect x="60" y="90" width="600" height="12" rx="6" fill="url(#spectrum)" opacity="0.8"/>

  <!-- Markers -->
  <!-- Chatbot -->
  <circle cx="60" cy="96" r="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="60" y="100" text-anchor="middle" fill="#94a3b8" font-size="14">💬</text>
  <text x="60" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">Chatbot</text>
  <text x="60" y="145" text-anchor="middle" fill="#64748b" font-size="9">Text in, text out</text>
  <text x="60" y="158" text-anchor="middle" fill="#64748b" font-size="9">No tools, no memory</text>

  <!-- Copilot -->
  <circle cx="260" cy="96" r="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="260" y="100" text-anchor="middle" fill="#a5b4fc" font-size="14">🔧</text>
  <text x="260" y="130" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Copilot</text>
  <text x="260" y="145" text-anchor="middle" fill="#64748b" font-size="9">Suggestions + tools</text>
  <text x="260" y="158" text-anchor="middle" fill="#64748b" font-size="9">Human decides</text>

  <!-- Agent -->
  <circle cx="460" cy="96" r="16" fill="#1a0a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="460" y="100" text-anchor="middle" fill="#c4b5fd" font-size="14">🤖</text>
  <text x="460" y="130" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Agent</text>
  <text x="460" y="145" text-anchor="middle" fill="#64748b" font-size="9">Plans + executes</text>
  <text x="460" y="158" text-anchor="middle" fill="#64748b" font-size="9">Multi-step, self-corrects</text>

  <!-- Autonomous -->
  <circle cx="660" cy="96" r="16" fill="#0f2a1a" stroke="#4ade80" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" fill="#4ade80" font-size="14">🌐</text>
  <text x="660" y="130" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Autonomous</text>
  <text x="660" y="145" text-anchor="middle" fill="#64748b" font-size="9">Goal-driven, persistent</text>
  <text x="660" y="158" text-anchor="middle" fill="#64748b" font-size="9">Learns from outcomes</text>

  <!-- Arrow labels -->
  <text x="160" y="76" text-anchor="middle" fill="#475569" font-size="9">+ tools</text>
  <text x="360" y="76" text-anchor="middle" fill="#475569" font-size="9">+ planning</text>
  <text x="560" y="76" text-anchor="middle" fill="#475569" font-size="9">+ memory</text>

  <!-- Bottom annotation -->
  <text x="360" y="188" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Most "agentic AI" products sit between Chatbot and Copilot</text>
</svg>