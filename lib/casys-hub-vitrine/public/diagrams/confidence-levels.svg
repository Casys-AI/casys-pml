<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <!-- svg-source:excalidraw — confidence-levels.excalidraw -->
  <defs>
    <marker id="ah-666666" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#666666"/></marker>
  </defs>

  <rect x="0" y="0" width="600" height="440" fill="#08080a"/>
  <text x="20" y="34" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#f0ede8" text-anchor="start">Confidence Promotion Path</text>
  <rect x="20" y="60" width="140" height="80" rx="8" fill="#1f1f23" stroke="#f87171" stroke-width="2"/>
  <text x="90" y="81" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#f87171" text-anchor="middle">template</text>
  <text x="90" y="106" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#f87171" text-anchor="middle">50%</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle" y="123">
    <tspan x="90">User-defined</tspan>
    <tspan x="90" dy="10.4">Not yet tested</tspan>
  </text>
  <path d="M165 100 L225 100" fill="none" stroke="#666666" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-666666)"/>
  <text x="195" y="89" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#666666" text-anchor="middle">1st exec</text>
  <rect x="230" y="60" width="140" height="80" rx="8" fill="#1f1f23" stroke="#fbbf24" stroke-width="2"/>
  <text x="300" y="81" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#fbbf24" text-anchor="middle">inferred</text>
  <text x="300" y="106" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#fbbf24" text-anchor="middle">70%</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle" y="123">
    <tspan x="300">Observed 1-2 times</tspan>
    <tspan x="300" dy="10.4">Promising</tspan>
  </text>
  <path d="M375 100 L435 100" fill="none" stroke="#666666" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-666666)"/>
  <text x="405" y="89" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#666666" text-anchor="middle">3+ execs</text>
  <rect x="440" y="60" width="140" height="80" rx="8" fill="#1f1f23" stroke="#4ade80" stroke-width="2"/>
  <text x="510" y="81" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#4ade80" text-anchor="middle">observed</text>
  <text x="510" y="106" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="16" fill="#4ade80" text-anchor="middle">100%</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle" y="123">
    <tspan x="510">Confirmed by 3+</tspan>
    <tspan x="510" dy="10.4">Fully validated</tspan>
  </text>
  <text x="20" y="182" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#f0ede8" text-anchor="start">Confidence Calculation</text>
  <rect x="20" y="195" width="300" height="35" rx="4" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="170" y="216" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#60a5fa" text-anchor="middle">Confidence = Edge Type × Source Modifier</text>
  <text x="20" y="260" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#a78bfa" text-anchor="start">Edge Type Weights</text>
  <text x="35" y="279" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#888888" text-anchor="start">dependency: 1.0</text>
  <text x="35" y="294" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#888888" text-anchor="start">contains: 0.8</text>
  <text x="35" y="309" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#888888" text-anchor="start">alternative: 0.6</text>
  <text x="35" y="324" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#888888" text-anchor="start">sequence: 0.5</text>
  <text x="180" y="260" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#a78bfa" text-anchor="start">Source Modifiers</text>
  <text x="195" y="279" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#4ade80" text-anchor="start">observed: 1.0</text>
  <text x="195" y="294" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#fbbf24" text-anchor="start">inferred: 0.7</text>
  <text x="195" y="309" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#f87171" text-anchor="start">template: 0.5</text>
  <text x="360" y="182" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#f0ede8" text-anchor="start">Impact on Experience</text>
  <rect x="360" y="195" width="220" height="40" rx="4" fill="#2d2d35" stroke="#60a5fa" stroke-width="1"/>
  <text x="375" y="210" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#60a5fa" text-anchor="start">Search</text>
  <text x="375" y="223" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="start">High confidence → higher rank</text>
  <rect x="360" y="245" width="220" height="40" rx="4" fill="#2d2d35" stroke="#a78bfa" stroke-width="1"/>
  <text x="375" y="260" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#a78bfa" text-anchor="start">DAG Building</text>
  <text x="375" y="273" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="start">Only edges with &gt; 30% used</text>
  <rect x="360" y="295" width="220" height="40" rx="4" fill="#2d2d35" stroke="#4ade80" stroke-width="1"/>
  <text x="375" y="310" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#4ade80" text-anchor="start">Suggestions</text>
  <text x="375" y="323" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="start">Low confidence shown last</text>
  <text x="20" y="361" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#22d3ee" text-anchor="start">Example</text>
  <rect x="20" y="370" width="560" height="50" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="9" fill="#888888" text-anchor="start" y="387">
    <tspan x="35">sequence + inferred = 0.5 × 0.7 = 0.35 (used in DAG)</tspan>
    <tspan x="35" dy="11.7">sequence + template = 0.5 × 0.5 = 0.25 (ignored, &lt; 0.30)</tspan>
  </text>
</svg>