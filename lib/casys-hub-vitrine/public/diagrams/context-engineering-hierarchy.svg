<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" width="520" height="250">
  <!-- svg-source:excalidraw — context-engineering-hierarchy.excalidraw -->

  <rect x="0" y="0" width="520" height="250" fill="#08080a"/>

  <!-- Outer: Context Engineering -->
  <rect x="20" y="20" width="480" height="210" rx="12" fill="transparent" stroke="#fbbf24" stroke-width="2"/>
  <text x="260" y="44" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">Context Engineering</text>
  <text x="260" y="58" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle">Tools + Data + Sequence + Session + Business Rules</text>

  <!-- Middle: GraphRAG -->
  <rect x="55" y="72" width="410" height="130" rx="10" fill="transparent" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="260" y="92" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">GraphRAG</text>
  <text x="260" y="106" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle">Knowledge graph traversal + relational retrieval</text>

  <!-- Inner: RAG -->
  <rect x="100" y="118" width="320" height="68" rx="8" fill="#1f1f23" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="260" y="142" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">RAG (Vector Retrieval)</text>
  <text x="260" y="158" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#888888" text-anchor="middle">Embedding cosine similarity — finds similar</text>
  <text x="260" y="172" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#666666" text-anchor="middle">"deploy" → docs about deployment</text>

  <!-- GraphRAG annotation -->
  <text x="140" y="200" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#a78bfa" text-anchor="middle">+ finds related</text>
  <text x="140" y="213" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="7" fill="#666666" text-anchor="middle">"deploy" → git + docker + CI</text>

  <!-- Context Engineering unique parts -->
  <text x="400" y="200" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#fbbf24" text-anchor="middle">+ tool selection</text>
  <text x="400" y="213" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#fbbf24" text-anchor="middle">+ sequence prediction</text>
  <text x="400" y="226" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="8" fill="#fbbf24" text-anchor="middle">+ context budgeting</text>
</svg>