<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 430" width="620" height="430">
  <!-- svg-source:excalidraw — config-overview.excalidraw -->
  <rect x="0" y="0" width="620" height="430" fill="#08080a"/>
  <g transform="translate(-20 0)">
  <text x="40" y="34" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="14" fill="#f0ede8" text-anchor="start">PML Configuration Overview</text>
  <rect x="40" y="55" width="180" height="130" rx="8" fill="#1f1f23" stroke="#60a5fa" stroke-width="2"/>
  <text x="130" y="76" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">Environment Variables</text>
  <text x="55" y="98" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#4ade80" text-anchor="start">PML_DB_PATH</text>
  <text x="55" y="113" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#4ade80" text-anchor="start">PML_WORKFLOW_PATH</text>
  <text x="55" y="128" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#fbbf24" text-anchor="start">PML_NO_PII_PROTECTION</text>
  <text x="55" y="143" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#fbbf24" text-anchor="start">PML_NO_CACHE</text>
  <text x="55" y="158" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#888888" text-anchor="start">LOG_LEVEL</text>
  <text x="55" y="173" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#888888" text-anchor="start">SENTRY_DSN</text>
  <rect x="240" y="55" width="180" height="130" rx="8" fill="#1f1f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="330" y="76" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">MCP Server Config</text>
  <text x="255" y="94" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">mcp-servers.json</text>
  <rect x="255" y="102" width="150" height="70" rx="4" fill="#2d2d35" stroke="#a78bfa" stroke-width="1"/>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#888888" text-anchor="start" y="116">
    <tspan x="265">mcpServers:</tspan>
    <tspan x="265" dy="10.4">  &lt;server-id&gt;:</tspan>
    <tspan x="265" dy="10.4">    command: ...</tspan>
    <tspan x="265" dy="10.4">    args: [...]</tspan>
    <tspan x="265" dy="10.4">    env: {...}</tspan>
  </text>
  <rect x="440" y="55" width="180" height="130" rx="8" fill="#1f1f23" stroke="#fbbf24" stroke-width="2"/>
  <text x="530" y="76" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">Algorithm Config</text>
  <text x="455" y="99" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">local-alpha.yaml</text>
  <text x="455" y="112" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#666666" text-anchor="start">Semantic vs Graph balance</text>
  <text x="455" y="134" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="9" fill="#888888" text-anchor="start">speculation_config.yaml</text>
  <text x="455" y="147" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#666666" text-anchor="start">Speculative execution</text>
  <text x="455" y="168" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#4ade80" text-anchor="start">confidence_threshold: 0.70</text>
  <text x="40" y="217" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="12" fill="#f0ede8" text-anchor="start">Storage Structure</text>
  <rect x="40" y="230" width="250" height="130" rx="8" fill="#1f1f23" stroke="#4ade80" stroke-width="2"/>
  <text x="55" y="251" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="11" fill="#4ade80" text-anchor="start">~/.pml/</text>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#888888" text-anchor="start" y="268">
    <tspan x="55">├── db/           # PGlite database</tspan>
    <tspan x="55" dy="10.4">│   ├── base/</tspan>
    <tspan x="55" dy="10.4">│   ├── global/</tspan>
    <tspan x="55" dy="10.4">│   └── ...</tspan>
    <tspan x="55" dy="10.4">├── logs/         # Application logs</tspan>
    <tspan x="55" dy="10.4">│   └── pml.log</tspan>
    <tspan x="55" dy="10.4">└── cache/        # Execution cache</tspan>
  </text>
  <text x="320" y="217" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="12" fill="#f0ede8" text-anchor="start">Claude Code Integration</text>
  <rect x="320" y="230" width="300" height="130" rx="8" fill="#1f1f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="335" y="248" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="8" fill="#a78bfa" text-anchor="start">~/.config/Claude/claude_desktop_config.json</text>
  <rect x="335" y="260" width="270" height="85" rx="4" fill="#2d2d35" stroke="#a78bfa" stroke-width="1"/>
  <text font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="7" fill="#888888" text-anchor="start" y="275">
    <tspan x="345">{</tspan>
    <tspan x="345" dy="9.1">  &quot;mcpServers&quot;: {</tspan>
    <tspan x="345" dy="9.1">    &quot;pml&quot;: {</tspan>
    <tspan x="345" dy="9.1">      &quot;command&quot;: &quot;/path/to/pml&quot;,</tspan>
    <tspan x="345" dy="9.1">      &quot;args&quot;: [&quot;serve&quot;, &quot;--config&quot;, &quot;...&quot;]</tspan>
    <tspan x="345" dy="9.1">    }</tspan>
    <tspan x="345" dy="9.1">  }</tspan>
    <tspan x="345" dy="9.1">}</tspan>
  </text>
  <rect x="40" y="375" width="580" height="35" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="330" y="395" font-family="\"Inter\", \"Segoe UI\", system-ui, -apple-system, sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">Use absolute paths for command and --config in Claude integration</text>
  </g>
</svg>