# Sync SHGAT to public repository
# Syncs lib/shgat-tf/ folder to @casys/shgat package

name: Sync SHGAT

on:
  push:
    branches: [main]
    paths:
      - "lib/shgat-tf/**"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Clone shgat repo
        run: |
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/Casys-AI/shgat.git shgat-repo
          cd shgat-repo
          git checkout main || git checkout -b main

      - name: Sync lib/shgat-tf/ folder
        run: |
          # Remove existing files (except .git)
          find shgat-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy lib/shgat-tf/ contents to root of public repo
          cp -r lib/shgat-tf/* shgat-repo/

          # Copy .github workflows (hidden files not included in *)
          if [ -d "lib/shgat-tf/.github" ]; then
            cp -r lib/shgat-tf/.github shgat-repo/
          fi

          # Add LICENSE
          cp LICENSE shgat-repo/LICENSE

      - name: Commit and push
        run: |
          cd shgat-repo
          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          # Get the commit message from the triggering commit
          COMMIT_MSG=$(git log -1 --format="%s" ${{ github.sha }} 2>/dev/null || echo "Sync from pml-cloud")

          git commit -m "$COMMIT_MSG" -m "Synced from pml-cloud"
          git push origin main

      - name: Create version tag if needed
        run: |
          cd shgat-repo

          # Get version from deno.json
          VERSION=$(grep '"version"' deno.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          TAG="v$VERSION"

          echo "Current version: $VERSION"
          echo "Tag to check: $TAG"

          # Check if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists, skipping"
          else
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG created and pushed - this will trigger the publish workflow"
          fi
